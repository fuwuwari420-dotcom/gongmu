<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>谁死我公墓里了</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 1. 基础布局 */
        body { background-color: #0d1117; color: #555; font-family: "STKaiti", "楷体", serif; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        
        /* 2. 墓园视图 */
        #cemetery-view { display: block; padding: 15px; text-align: center; height: 100vh; overflow-y: auto; position: relative; }
        .grave-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 50px; }
        .grave-card { background: rgba(255,255,255,0.02); border: 1px solid #1c2128; padding: 8px; border-radius: 4px; position: relative; overflow: hidden; }
        .grave-card img { width: 100%; height: 110px; object-fit: cover; filter: grayscale(100%); opacity: 0.6; transition: all 0.3s; }
        
        /* 长按挖坟效果 */
        .grave-card.is-deleting img { filter: grayscale(100%) brightness(0.2); opacity: 0.8; }
        .unearth-btn { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: #a00; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: bold; display: none; z-index: 100; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .grave-card.is-deleting .unearth-btn { display: block; }

        /* 3. 灵堂视图 */
        #hall-view { display: none; flex-direction: column; align-items: center; padding-top: 20px; height: 100vh; position: relative; }
        .photo-area { position: relative; width: 220px; height: 280px; margin-bottom: 20px; overflow: hidden; }
        .user-photo { position: absolute; top: 11%; left: 12%; width: 76%; height: 78%; object-fit: cover; filter: grayscale(100%); z-index: 1; }
        .frame-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* 彩蛋气泡 */
        .speech-bubble {
            position: absolute; top: 15px; right: 5px; background: white; color: black;
            padding: 6px 12px; border-radius: 12px; font-size: 13px; z-index: 50;
            display: none; box-shadow: 0 0 15px rgba(0,0,0,0.8); font-weight: bold;
            max-width: 150px; line-height: 1.4;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 20px;
            border-width: 8px 8px 0; border-style: solid; border-color: white transparent;
        }

        /* 祭坛布局 */
        .altar { display: flex; align-items: flex-end; justify-content: center; width: 100%; margin-top: -65px; z-index: 10; }
        .plate-container { width: 90px; height: 90px; background: url('https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/1775240868115.png') no-repeat center/contain; display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; top: 25px; z-index: 15; }
        #plate-l { left: 60px; } #plate-r { right: 60px; }
        .plate-content { transform: translateY(-5px); pointer-events: none; }
        
        .censer-container { position: relative; width: 200px; height: 140px; display: flex; justify-content: center; z-index: 10; }
        #censer-base { position: absolute; bottom: 0; width: 100%; height: auto; z-index: 10; }
        #lit-incense-img { position: absolute; bottom: -50px; width: 100%; height: auto; z-index: 12; display: none; pointer-events: none; }

        /* 互动按钮 */
        .action-zone { display: flex; gap: 20px; margin-top: 10px; z-index: 20; }
        .action-btn { padding: 8px 15px; background: #1c2128; color: #666; border: 1px solid #2d333b; border-radius: 4px; font-size: 13px; cursor: pointer; }

        /* 【核心补回】财富/功德 浮动文字样式与动画 */
        .float-text { 
            position: fixed; color: #e1b12c; font-weight: bold; pointer-events: none; 
            z-index: 9999; animation: floatUp 0.8s ease-out forwards; font-size: 20px; 
        }
        @keyframes floatUp { 
            0% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(-100px); opacity: 0; } 
        }

        /* 弹幕样式 */
        .danmaku { position: absolute; white-space: nowrap; color: rgba(255, 255, 255, 0.5); font-size: 15px; pointer-events: none; z-index: 20; text-shadow: 1px 1px 2px #000; animation: dmMove 10s linear forwards; }
        @keyframes dmMove { from { left: 110%; } to { left: -180%; } }

        /* UI 组件 */
        #rank-entry { position: fixed; top: 15px; left: 15px; z-index: 200; background: #1c2128; padding: 5px 10px; border: 1px solid #2d333b; border-radius: 4px; color: #888; font-size: 13px; }
        #rank-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        .rank-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .rank-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; margin-bottom: 5px; font-size: 12px; }
        #music-toggle { position: fixed; top: 10px; right: 10px; z-index: 200; width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #555; display: flex; align-items: center; justify-content: center; }
        
        .inventory { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.4); padding: 10px 0; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #1c2128; z-index: 100; }
        .incense-stick { width: 80px; height: 80px; object-fit: contain; cursor: grab; }
        .emoji-item { font-size: 35px; cursor: grab; padding: 5px; }
        .dragging-ghost { position: fixed; pointer-events: none; z-index: 999; width: 100px; height: 100px; font-size: 45px; opacity: 0.7; transform: translate(-50%, -50%); }
        .btn { padding: 6px 12px; background: #1c2128; color: #444; border: 1px solid #2d333b; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

    <audio id="bg-audio" loop src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/audio.m4s"></audio>

    <div id="rank-modal" onclick="this.style.display='none'">
        <div style="color:#e1b12c; text-align:center; margin-bottom:20px; font-size:20px;">总之有个榜</div>
        <div class="rank-columns">
            <div><h4 style="color:#e1b12c">💰 财富榜</h4><div id="rank-wealth"></div></div>
            <div><h4 style="color:#e1b12c">🙇 功德榜</h4><div id="rank-merit"></div></div>
        </div>
    </div>

    <div id="cemetery-view">
        <div id="rank-entry" onclick="showRank()">查看排行</div>
        <h1 style="font-size: 22px; color: #2d333b; margin-top: 50px;">🪦 赛博公墓</h1>
        <div id="grave-list" class="grave-grid">看看这里鼠了谁…</div>
        <button class="btn" onclick="startUpload()" style="margin-top:30px; background:#300; border:none; color:#555;">再埋一个</button>
    </div>

    <div id="hall-view">
        <button class="btn" style="position:fixed; top:10px; left:10px;" onclick="location.reload()">返回</button>
        <div id="music-toggle" onclick="toggleMusic()">🔇</div>
        <h2 id="display-name" style="margin:5px 0; font-size: 18px; color: #2d333b;">之灵位</h2>
        
        <div class="photo-area" onclick="hitPhoto()">
            <div id="speech-bubble" class="speech-bubble">为什么……要扇我…</div>
            <img id="hall-user-img" class="user-photo" src="">
            <img class="frame-photo" src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1548.PNG">
        </div>

        <div class="altar">
            <div id="plate-l" class="plate-container drop-zone" data-type="plate"><span class="plate-content"></span></div>
            <div class="censer-container drop-zone" data-type="censer">
                <img id="censer-base" src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1549.PNG">
                <img id="lit-incense-img" src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1551.PNG">
            </div>
            <div id="plate-r" class="plate-container drop-zone" data-type="plate"><span class="plate-content"></span></div>
        </div>

        <div class="action-zone">
            <div class="action-btn" onclick="triggerAction(this, 'wealth', '财富+1')">🔥 烧纸钱</div>
            <div class="action-btn" onclick="triggerAction(this, 'merit', '功德+1')">🙇 磕响头</div>
        </div>

        <div class="inventory" id="inventory-bar" style="padding-bottom: 25px;"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xtplnnzudkqkkzntqtal.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vrJ1yK1oe8wzdiDsrwIwXg_q4hW2527';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ALL_GIFTS = ["🍎", "🍗", "🍕", "🚬", "🍺", "🍦", "🎮", "📱", "🌹", "🕯️", "🍱", "🍰", "🍵", "🥤", "🍔", "🍼", "🍌", "🥑", "🍄", "🎧", "🎬", "💸", "💊", "🥮", "💐", "🥪", "🍤", "🧶", "🫐", "🍩", "🧸", "🎁", "💿", "👑", "🎂", "🍭"];
        const DANMAKU_WORDS = ["可惜为时已晚，xxx已经鼠了", "xxx不要鼠啊", "rip", "xxx你死的好惨啊", "奖励自己一瓶啮齿动物爱喝的小饮料", "🕯️🕯️🕯️", "地面正以9.8m/s的速度上升", "手腕上痒痒的好像有青色的虫子在爬 我去拿把刀挑了", "永远怀念深重悼念", "扣1复活xxx", "我会想你的小xxx", "谢谢你 我去极乐世界了"];
        const BUBBLE_WORDS = ["欺负一个鼠了的xxx？", "为什么……要扇我…", "手重了点吧……", "👁👁❓", "你…干嘛这样……", "鸣鸣鸣xxx好委屈", "扇我算什么有本事去扇活着的xxx啊", "打得好，再来一次（误）"];

        let currentGraveId = null;
        let photoHits = 0;
        const audio = document.getElementById('bg-audio');
        const mBtn = document.getElementById('music-toggle');

        async function load() {
            const { data } = await client.from('graves').select('*').order('id', {ascending:false});
            const list = document.getElementById('grave-list');
            list.innerHTML = (data || []).map(g => `
                <div class="grave-card" id="card-${g.id}" ontouchstart="hTouchS(event, ${g.id})" ontouchend="hTouchE(event)" onclick="hClick(event, ${g.id}, '${g.name}', '${g.photo_url}')">
                    <button class="unearth-btn" onclick="confirmDelete(event, ${g.id}, '${g.name}')">挖坟</button>
                    <img src="${g.photo_url}"><div style="font-size: 12px; margin-top:4px; color:#2d333b;">${g.name} 之墓</div>
                </div>
            `).join('');
        }

        let tTimer = null;
        function hTouchS(e, id) { tTimer = setTimeout(() => { document.querySelectorAll('.grave-card').forEach(el => el.classList.remove('is-deleting')); document.getElementById(`card-${id}`).classList.add('is-deleting'); }, 800); }
        function hTouchE() { clearTimeout(tTimer); }
        function hClick(e, id, name, url) { 
            const card = document.getElementById(`card-${id}`);
            if (card.classList.contains('is-deleting')) { if (e.target.className !== 'unearth-btn') card.classList.remove('is-deleting'); return; }
            openHall(id, name, url);
        }

        async function confirmDelete(e, id, name) {
            e.stopPropagation();
            const userInput = prompt(`确定要挖坟吗？此操作不可逆。请输入：\n我确定要把${name}从坟里挖出来`);
            if (userInput === `我确定要把${name}从坟里挖出来`) {
                const { error } = await client.from('graves').delete().eq('id', id);
                if (!error) { alert("已被挫骨扬灰，公墓地皮压力-1"); location.reload(); }
                else { alert("没挖出来。"); }
            } else { alert("挖坟的意志不够坚定！"); document.getElementById(`card-${id}`).classList.remove('is-deleting'); }
        }

        function checkBirthday(name) {
            const now = new Date();
            if (name === "千明" && now.getMonth() === 3 && now.getDate() === 5) {
                alert("老公生日快乐！🎂✨呃小风风携gmn一起祝福啊不管了反正你乐一下吧没多少功能，这个弹窗今天之内点一下跳一下的喵");
            }
        }

        function hitPhoto() {
            photoHits++;
            if (photoHits % 3 === 0) {
                const name = document.getElementById('display-name').innerText.replace(" 之灵位", "");
                const bubble = document.getElementById('speech-bubble');
                bubble.innerText = BUBBLE_WORDS[Math.floor(Math.random() * BUBBLE_WORDS.length)].replace(/xxx/g, name);
                bubble.style.display = "block";
                setTimeout(() => { bubble.style.display = "none"; }, 1500);
            }
        }

        function spawnDanmaku() {
            if (document.getElementById('hall-view').style.display !== 'flex') return;
            const name = document.getElementById('display-name').innerText.replace(" 之灵位", "");
            const el = document.createElement('div');
            el.className = 'danmaku';
            el.innerText = DANMAKU_WORDS[Math.floor(Math.random()*DANMAKU_WORDS.length)].replace(/xxx/g, name);
            el.style.top = (Math.random() * 150 + 80) + "px";
            document.getElementById('hall-view').appendChild(el);
            setTimeout(() => el.remove(), 10000);
        }
        setInterval(spawnDanmaku, 1800);

        async function showRank() {
            document.getElementById('rank-modal').style.display = 'block';
            const { data: w } = await client.from('graves').select('name, wealth').order('wealth', {ascending:false}).limit(10);
            const { data: m } = await client.from('graves').select('name, merit').order('merit', {ascending:false}).limit(10);
            document.getElementById('rank-wealth').innerHTML = (w||[]).map(i => `<div class="rank-item"><span>${i.name}</span><span>${i.wealth}</span></div>`).join('');
            document.getElementById('rank-merit').innerHTML = (m||[]).map(i => `<div class="rank-item"><span>${i.name}</span><span>${i.merit}</span></div>`).join('');
        }

        // --- 特效与逻辑核心 ---
        async function triggerAction(btn, field, text) {
            // A. 生成浮动特效
            const rect = btn.getBoundingClientRect();
            const el = document.createElement('div'); 
            el.className = 'float-text'; 
            el.innerText = text;
            el.style.left = (rect.left + rect.width / 2) + 'px'; 
            el.style.top = rect.top + 'px';
            document.body.appendChild(el); 
            setTimeout(() => el.remove(), 800);

            // B. 音效触发
            if (audio.paused) toggleMusic();

            // C. 数据库更新
            const { data } = await client.from('graves').select(field).eq('id', currentGraveId).single();
            await client.from('graves').update({ [field]: (data[field] || 0) + 1 }).eq('id', currentGraveId);
        }

        function toggleMusic() { if (audio.paused) { audio.play(); mBtn.innerText = "🎵"; mBtn.style.color = "#e1b12c"; } else { audio.pause(); mBtn.innerText = "🔇"; mBtn.style.color = "#555"; } }

        function openHall(id, name, url) {
            currentGraveId = id; photoHits = 0;
            document.getElementById('cemetery-view').style.display = 'none';
            document.getElementById('hall-view').style.display = 'flex';
            document.getElementById('display-name').innerText = name + " 之灵位";
            document.getElementById('hall-user-img').src = url;
            document.getElementById('lit-incense-img').style.display = 'none';
            checkBirthday(name);
            toggleMusic();
            const bar = document.getElementById('inventory-bar');
            const randomGifts = [...ALL_GIFTS].sort(() => 0.5 - Math.random()).slice(0, 4);
            bar.innerHTML = `<img class="drag-item incense-stick" data-kind="incense" src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1550.PNG">${randomGifts.map(emoji => `<div class="drag-item emoji-item" data-kind="emoji">${emoji}</div>`).join('')}`;
        }

        let currentGhost = null; let dragInfo = null;
        document.addEventListener('touchstart', (e) => {
            const el = e.target.closest('.drag-item'); if (!el) return;
            dragInfo = { kind: el.dataset.kind, content: el.innerText || el.src };
            currentGhost = el.cloneNode(true); currentGhost.classList.add('dragging-ghost');
            document.body.appendChild(currentGhost);
            currentGhost.style.left = e.touches[0].clientX + 'px'; currentGhost.style.top = e.touches[0].clientY + 'px';
        });
        document.addEventListener('touchmove', (e) => { if (currentGhost) { e.preventDefault(); currentGhost.style.left = e.touches[0].clientX + 'px'; currentGhost.style.top = e.touches[0].clientY + 'px'; } }, { passive: false });
        document.addEventListener('touchend', (e) => {
            if (!currentGhost) return;
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.drop-zone');
            if (target) {
                if (target.dataset.type === 'censer' && dragInfo.kind === 'incense') document.getElementById('lit-incense-img').style.display = 'block';
                else if (target.dataset.type === 'plate' && dragInfo.kind === 'emoji') target.querySelector('span').innerText = dragInfo.content;
            }
            document.body.removeChild(currentGhost); currentGhost = null;
        });

        async function startUpload() {
            const n = prompt("受害者姓名："); if (!n) return;
            const f = document.createElement('input'); f.type = 'file'; f.accept = 'image/*';
            f.onchange = async () => {
                const file = f.files[0]; const path = `${Date.now()}_${file.name}`;
                await client.storage.from('photos').upload(path, file);
                const { data } = client.storage.from('photos').getPublicUrl(path);
                await client.from('graves').insert([{ name: n, photo_url: data.publicUrl, wealth: 0, merit: 0 }]);
                location.reload();
            };
            f.click();
        }
        window.onload = load;
    </script>
</body>
</html>
