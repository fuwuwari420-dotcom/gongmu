<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赛博互动公墓</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #ccc; font-family: "STKaiti", "楷体", serif; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        
        /* 公墓列表 */
        #cemetery-view { display: block; padding: 20px; text-align: center; height: 100vh; overflow-y: auto; }
        .grave-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .grave-card { background: #111; border: 1px solid #333; padding: 10px; border-radius: 5px; }
        .grave-card img { width: 100%; height: 120px; object-fit: cover; filter: grayscale(100%); }

        /* 灵堂视图 */
        #hall-view { display: none; flex-direction: column; align-items: center; padding-top: 40px; height: 100vh; position: relative; }
        
        /* 遗像区域 */
        .photo-area { position: relative; width: 220px; height: 280px; }
        .user-photo { position: absolute; top: 15%; left: 15%; width: 70%; height: 60%; object-fit: cover; filter: grayscale(100%); z-index: 1; }
        .frame-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* 祭坛布局 */
        .altar { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin-top: 30px; }
        .plate { width: 70px; height: 70px; border-bottom: 2px solid #444; display: flex; align-items: center; justify-content: center; font-size: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        #censer-img { width: 120px; height: auto; z-index: 5; }

        /* 底部物品栏 */
        .inventory { position: fixed; bottom: 0; width: 100%; background: #111; padding: 20px 0; display: flex; justify-content: center; gap: 25px; border-top: 1px solid #333; z-index: 100; }
        .item { font-size: 40px; touch-action: none; cursor: grab; }
        .incense-stick { width: 50px; height: 50px; object-fit: contain; }

        /* 拖拽中的虚影 */
        .dragging-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 50px;
            opacity: 0.8;
            transform: translate(-50%, -50%);
        }

        .btn { padding: 10px 20px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="cemetery-view">
        <h1>🪦 赛博公墓</h1>
        <div id="grave-list" class="grave-grid">加载亡魂中...</div>
        <button class="btn" onclick="startUpload()" style="margin-top:40px; background:#800;">安葬新角色</button>
    </div>

    <div id="hall-view">
        <button class="btn" style="position:fixed; top:10px; left:10px;" onclick="location.reload()">返回</button>
        <h2 id="display-name">灵位</h2>
        
        <div class="photo-area">
            <img id="hall-user-img" class="user-photo" src="">
            <img class="frame-photo" src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1548.PNG">
        </div>

        <div class="altar">
            <div class="plate drop-zone" data-type="plate">💿</div>
            <img id="censer-img" class="drop-zone" data-type="censer" src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1549.PNG">
            <div class="plate drop-zone" data-type="plate">🥣</div>
        </div>

        <div class="inventory">
            <img class="drag-item incense-stick" data-kind="incense" src="https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1550.PNG">
            <div class="drag-item item" data-kind="emoji">🍎</div>
            <div class="drag-item item" data-kind="emoji">🍗</div>
            <div class="drag-item item" data-kind="emoji">🚬</div>
            <div class="drag-item item" data-kind="emoji">🍺</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xtplnnzudkqkkzntqtal.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vrJ1yK1oe8wzdiDsrwIwXg_q4hW2527';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 加载列表
        async function load() {
            const { data } = await client.from('graves').select('*').order('id', {ascending:false});
            const list = document.getElementById('grave-list');
            list.innerHTML = data.map(g => `
                <div class="grave-card" onclick="openHall('${g.name}', '${g.photo_url}')">
                    <img src="${g.photo_url}">
                    <div>${g.name}</div>
                </div>
            `).join('');
        }

        function openHall(name, url) {
            document.getElementById('cemetery-view').style.display = 'none';
            document.getElementById('hall-view').style.display = 'flex';
            document.getElementById('display-name').innerText = name;
            document.getElementById('hall-user-img').src = url;
        }

        // --- 拖拽交互核心逻辑 (支持手机) ---
        let currentGhost = null;
        let dragInfo = null;

        document.addEventListener('touchstart', function(e) {
            const el = e.target.closest('.drag-item');
            if (!el) return;

            dragInfo = {
                kind: el.dataset.kind,
                content: el.innerText || el.src
            };

            // 创建跟随手指的虚影
            currentGhost = el.cloneNode(true);
            currentGhost.classList.add('dragging-ghost');
            document.body.appendChild(currentGhost);
            moveGhost(e.touches[0]);
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if (!currentGhost) return;
            e.preventDefault(); // 禁止页面滚动
            moveGhost(e.touches[0]);
        }, { passive: false });

        document.addEventListener('touchend', function(e) {
            if (!currentGhost) return;

            const touch = e.changedTouches[0];
            // 获取手指松开位置下的元素
            const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.drop-zone');

            if (dropTarget) {
                const zoneType = dropTarget.dataset.type;
                if (zoneType === 'censer' && dragInfo.kind === 'incense') {
                    dropTarget.src = "https://xtplnnzudkqkkzntqtal.supabase.co/storage/v1/object/public/photos/IMG_1551.PNG";
                } else if (zoneType === 'plate' && dragInfo.kind === 'emoji') {
                    dropTarget.innerText = dragInfo.content;
                }
            }

            document.body.removeChild(currentGhost);
            currentGhost = null;
            dragInfo = null;
        });

        function moveGhost(touch) {
            currentGhost.style.left = touch.clientX + 'px';
            currentGhost.style.top = touch.clientY + 'px';
        }

        // 上传功能
        async function startUpload() {
            const n = prompt("输入死者姓名：");
            if (!n) return;
            const f = document.createElement('input');
            f.type = 'file'; f.accept = 'image/*';
            f.onchange = async () => {
                const file = f.files[0];
                const path = `${Date.now()}_${file.name}`;
                await client.storage.from('photos').upload(path, file);
                const { data } = client.storage.from('photos').getPublicUrl(path);
                await client.from('graves').insert([{ name: n, photo_url: data.publicUrl }]);
                alert("安葬成功！");
                location.reload();
            };
            f.click();
        }

        window.onload = load;
    </script>
</body>
</html>
